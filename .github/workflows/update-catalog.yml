name: Update Plugin Catalog

on:
  push:
    branches: [main]
    paths:
      - '*/\.claude-plugin/plugin.json'
      - 'catalog.json'
  workflow_dispatch:

jobs:
  update-catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Regenerate catalog.json
        run: node .github/scripts/generate-catalog.js

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog.json
          if git diff --staged --quiet; then
            echo "catalog.json unchanged — nothing to commit."
          else
            git commit -m "chore: auto-update catalog.json [skip ci]"
            git push
          fi
